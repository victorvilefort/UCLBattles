<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCLBattles | Login</title>
    <link rel="stylesheet" href="./css/login.css">
    <link rel="shortcut icon" href="./assets/img/favicon.ico" type="image/x-icon">
</head>
<body>
    <div class="navbar">
    <div class="logo">
        <img src="assets/img/UEFA_Champions_League.png" alt="">
         <p>UCLBattles</p>
    </div>
        <a href="login.html"><button>Login</button></a>
        <a href="cadastro.html"><button>Cadastro</button></a>
        <a href="home.html"><button>Página Inicial</button></a>
    </div>
    <div class="main">
        <div class="title">
               <h1>UCLBattles</h1>
        </div>
        <div class="text-card">
             <p>⚡ Entre em campo e compare suas habilidades com os melhores do mundo!</p>
        </div>
        <div class="forms">
            <div class="fields">
                <p>Email:</p>
                <input type="text" id="ipt_email">
                <p>Senha:</p>
                <input type="text" id="ipt_senha">
                <div class="button-create">
                     <button onclick="entrar()">Entrar no campo</button>
                </div>
                <span>Não tem conta? <a href="cadastro.html">Criar agora</a></span>
            </div>
        </div>
    </div>
</body>
</html>
<script>
    function entrar() {
    var emailVar = ipt_email.value;
    var senhaVar = ipt_senha.value;

    if (!emailVar || !senhaVar) {
        alert("Preencha todos os campos!");
        return;
    }

    fetch("/usuarios/autenticar", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            emailServer: emailVar,
            senhaServer: senhaVar
        })
    }).then(function(resposta) {
        if (resposta.ok) {
            resposta.json().then(function(json) {
                console.log(json);
                sessionStorage.EMAIL_USUARIO = json.email;
                sessionStorage.NOME_USUARIO = json.nome;
                sessionStorage.ID_USUARIO = json.id;
                alert("Login realizado com sucesso!");
                window.location.href = "main.html";
            });
        } else {
            resposta.text().then(function(texto) {
                alert("Email e/ou senha inválidos!");
                console.error(texto);
            });
        }
    }).catch(function(erro) {
        console.log(erro);
        alert("Erro ao conectar com o servidor!");
    });
}
</script>
